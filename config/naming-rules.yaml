# ─── Pipeline naming (internal processing stages) ────────────────────────────
# Used by processor/pipeline.py for step-by-step output files.
# Pattern: {category}--{subfolder}--{descriptor}--v{N}--{stage}.jpg
naming:
  pattern: "{category}--{subfolder}--{descriptor}--{version}--{stage}.{ext}"

  categories:
    - hvac
    - home-security
    - flooring
    - windows
    - walk-in-shower

  subfolders:
    - hero-page
    - projects
    - before-after
    - products

  stages:
    - raw
    - clean
    - upscaled
    - corrected
    - final
    - generated

  extensions:
    - jpg
    - png
    - webp

  gen_methods:
    - gen-variation
    - gen-seasonal
    - gen-prompt
    - gen-extend

# ─── Media library naming (canonical storage format) ─────────────────────────
# Used by processor/classifier.py + processor/organizer.py for Media/ folder.
# Pattern: {niche}_{use}_{subtype}_{seq:03d}.jpg
media_naming:
  pattern: "{niche}_{use}_{subtype}_{seq:03d}.jpg"
  output_ext: jpg

  niches:
    hvac:
      label: "HVAC / Air Conditioning"
      keywords: [hvac, ac, air conditioning, ductwork, condenser]
    bathroom:
      label: "Bathroom Remodeling"
      keywords: [bathroom, vanity, tub, tile, toilet, sink]
    shower:
      label: "Walk-in Shower"
      keywords: [shower, walk-in, shower conversion, shower tiles]
    flooring:
      label: "Flooring Installation"
      keywords: [floor, hardwood, laminate, tile floor, carpet, vinyl]
    siding:
      label: "Exterior Siding"
      keywords: [siding, facade, exterior, vinyl siding, fiber cement]
    security:
      label: "Home Security"
      keywords: [camera, cctv, security, alarm, surveillance]

  uses:
    hero:
      label: "Hero Page"
      description: "Primary visual for landing page top section"
    ba:
      label: "Before / After"
      description: "Before/after project comparison content"
    project:
      label: "Project Showcase"
      description: "Completed project photos for portfolio section"

  subtypes:
    hero:
      worker: "Technician/worker actively on the job"
      result: "Finished installation, no people visible"
      product: "Equipment or product close-up"
      team:   "Team or crew group shot"
    ba:
      together: "Both before and after in one frame (split/collage)"
      before:   "Before state only — single frame"
      after:    "After state only — single frame (same seq as before)"
      story:    "Vertical/social-story format (9:16)"
      process:  "Work in progress / mid-installation"
    project:
      wide:    "Full room or area overview"
      detail:  "Close-up detail of workmanship"
      process: "Step-by-step installation shot"

  classifier:
    model: "openai/gpt-4o-mini"
    max_image_px: 512
    jpeg_quality: 85
    workers: 5
    min_confidence: 0.6
    min_quality_score: 4
