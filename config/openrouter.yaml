openrouter:
  base_url: "https://openrouter.ai/api/v1"
  api_key: "${OPENROUTER_API_KEY}"

  models:
    generate:
      id: "stability/stable-diffusion-xl-base-1.0"
      params:
        width: 1024
        height: 768
        steps: 30
        cfg_scale: 7.0

  defaults:
    negative_prompt: "text, watermark, blurry, low quality, distorted"
    style_preset: "photorealistic"
